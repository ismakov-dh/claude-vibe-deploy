# vibe-deploy infrastructure — Traefik + PostgreSQL
# Started by: vd init
# Managed by: vd

services:
  traefik:
    image: traefik:v3.3
    container_name: vd-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=vd-net"
      - "--entrypoints.web.address=:80"
      - "--log.level=WARN"
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:8099:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - vd-net
    labels:
      - "vd.role=traefik"

  postgres:
    image: postgres:15-alpine
    container_name: vd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vd_admin
      POSTGRES_PASSWORD: ${VD_POSTGRES_PASSWORD}
    command: ["postgres", "-c", "max_connections=100"]
    volumes:
      - vd-postgres-data:/var/lib/postgresql/data
    networks:
      - vd-db
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "vd_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "vd.role=postgres"

volumes:
  vd-postgres-data:

networks:
  vd-net:
    external: true
  vd-db:
    external: true
